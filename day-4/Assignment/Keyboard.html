<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Keyboard Design</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#1f2937,#111827);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.keyboard{
    background:#2d3748;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,.5);
}

.row{
    display:flex;
    gap:8px;
    margin-bottom:8px;
}

.key{
    width:55px;
    height:55px;
    background:#4b5563;
    color:white;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
}

.wide{
    width:90px;
}

.extra{
    width:120px;
}

.space{
    width:420px;
}
</style>
</head>
<body>

<div class="keyboard">

<div class="row">
<div class="key">Esc</div>
<div class="key">F1</div>
<div class="key">F2</div>
<div class="key">F3</div>
<div class="key">F4</div>
<div class="key">F5</div>
<div class="key">F6</div>
<div class="key">F7</div>
<div class="key">F8</div>
<div class="key">F9</div>
<div class="key">F10</div>
<div class="key">F11</div>
<div class="key">F12</div>
</div>

<div class="row">
<div class="key">~</div>
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key">0</div>
<div class="key">-</div>
<div class="key">=</div>
<div class="key wide">⌫</div>
</div>

<div class="row">
<div class="key wide">Tab</div>
<div class="key">Q</div>
<div class="key">W</div>
<div class="key">E</div>
<div class="key">R</div>
<div class="key">T</div>
<div class="key">Y</div>
<div class="key">U</div>
<div class="key">I</div>
<div class="key">O</div>
<div class="key">P</div>
<div class="key">[</div>
<div class="key">]</div>
<div class="key">\</div>
</div>

<div class="row">
<div class="key extra">Caps</div>
<div class="key">A</div>
<div class="key">S</div>
<div class="key">D</div>
<div class="key">F</div>
<div class="key">G</div>
<div class="key">H</div>
<div class="key">J</div>
<div class="key">K</div>
<div class="key">L</div>
<div class="key">;</div>
<div class="key">'</div>
<div class="key extra">Enter</div>
</div>

<div class="row">
<div class="key extra">Shift</div>
<div class="key">Z</div>
<div class="key">X</div>
<div class="key">C</div>
<div class="key">V</div>
<div class="key">B</div>
<div class="key">N</div>
<div class="key">M</div>
<div class="key">,</div>
<div class="key">.</div>
<div class="key">/</div>
<div class="key extra">Shift</div>
</div>

<div class="row">
<div class="key wide">Ctrl</div>
<div class="key wide">Win</div>
<div class="key wide">Alt</div>
<div class="key space">Space</div>
<div class="key wide">Alt</div>
<div class="key wide">Fn</div>
<div class="key wide">Ctrl</div>
</div>

</div>

</body>
</html>
